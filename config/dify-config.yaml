# Dify Project Configuration
# This file contains the main configuration for the Dify project

project:
  name: "drass"
  description: "Data Regulation Assistant - Dify Application Configuration"
  version: "1.0.0"
  environment: "development"

# Dify Platform Configuration
dify:
  platform_url: "${DIFY_PLATFORM_URL}"
  api_key: "${DIFY_API_KEY}"
  workspace_id: "${DIFY_WORKSPACE_ID}"
  
# Application Settings
applications:
  default_environment: "development"
  supported_environments:
    - development
    - staging
    - production
  
# Configuration Management
config_management:
  auto_backup: true
  version_control: true
  backup_retention_days: 30
  
# Logging Configuration
logging:
  level: "INFO"
  format: "json"
  output: "logs/"
  
# Security Settings
security:
  encrypt_sensitive_data: true
  allowed_origins: []
  rate_limiting:
    enabled: true
    requests_per_minute: 100
