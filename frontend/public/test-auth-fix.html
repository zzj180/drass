<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>认证修复测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .button { padding: 10px 20px; margin: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .button:hover { background: #0056b3; }
        .button:disabled { background: #ccc; cursor: not-allowed; }
        .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
        .warning { background: #fff3cd; color: #856404; }
        .form-group { margin: 10px 0; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .form-group input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>认证修复测试</h1>
    
    <div class="form-group">
        <label for="email">邮箱:</label>
        <input type="email" id="email" value="test@example.com">
    </div>
    
    <div class="form-group">
        <label for="password">密码:</label>
        <input type="password" id="password" value="testpassword123">
    </div>
    
    <button class="button" onclick="login()">登录</button>
    <button class="button" onclick="checkAuth()">检查认证状态</button>
    <button class="button" onclick="testDocumentsAPI()">测试文档API</button>
    <button class="button" onclick="clearAuth()">清除认证</button>
    
    <div id="result"></div>
    
    <script>
        function showResult(message, type = 'info') {
            const resultDiv = document.getElementById('result');
            const timestamp = new Date().toLocaleTimeString();
            resultDiv.innerHTML = `
                <div class="status ${type}">
                    <strong>[${timestamp}]</strong> ${message}
                </div>
            `;
        }
        
        async function login() {
            try {
                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                
                if (!email || !password) {
                    throw new Error('请输入邮箱和密码');
                }
                
                const formData = new FormData();
                formData.append('username', email);
                formData.append('password', password);
                
                const response = await fetch('http://localhost:8888/api/v1/auth/login', {
                    method: 'POST',
                    body: formData
                });
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ detail: response.statusText }));
                    throw new Error(`登录失败: ${errorData.detail || response.statusText}`);
                }
                
                const data = await response.json();
                localStorage.setItem('access_token', data.access_token);
                localStorage.setItem('refresh_token', data.refresh_token);
                
                // 设置token过期时间
                const expiresAt = new Date().getTime() + (data.expires_in * 1000);
                localStorage.setItem('token_expires_at', expiresAt.toString());
                
                showResult(`✅ 登录成功: ${email} (Token有效期: ${data.expires_in}秒)`, 'success');
            } catch (error) {
                showResult(`❌ 登录失败: ${error.message}`, 'error');
            }
        }
        
        function checkAuth() {
            const token = localStorage.getItem('access_token');
            const expiresAt = localStorage.getItem('token_expires_at');
            
            if (token) {
                const isExpired = expiresAt && new Date().getTime() > parseInt(expiresAt);
                const status = isExpired ? '已过期' : '有效';
                const type = isExpired ? 'warning' : 'success';
                showResult(`✅ Token存在: ${token.substring(0, 50)}... (状态: ${status})`, type);
            } else {
                showResult('❌ 没有找到Token', 'error');
            }
        }
        
        async function testDocumentsAPI() {
            try {
                const token = localStorage.getItem('access_token');
                if (!token) {
                    throw new Error('请先登录');
                }
                
                showResult('🔄 正在测试文档API...', 'info');
                
                const response = await fetch('http://localhost:8888/api/v1/documents/', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                    },
                });
                
                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({ detail: response.statusText }));
                    throw new Error(`API调用失败: ${errorData.detail || response.statusText} (状态码: ${response.status})`);
                }
                
                const documents = await response.json();
                showResult(`✅ 文档API测试成功: 找到 ${documents.length} 个文档`, 'success');
                
            } catch (error) {
                showResult(`❌ 文档API测试失败: ${error.message}`, 'error');
            }
        }
        
        function clearAuth() {
            localStorage.removeItem('access_token');
            localStorage.removeItem('refresh_token');
            localStorage.removeItem('token_expires_at');
            showResult('🗑️ 认证信息已清除', 'info');
        }
        
        // 页面加载时检查认证状态
        window.onload = function() {
            checkAuth();
        };
    </script>
</body>
</html>
