<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单刷新测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .button { padding: 10px 20px; margin: 10px; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; }
        .button:hover { background: #0056b3; }
        .status { padding: 10px; margin: 10px 0; border-radius: 4px; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }
        .info { background: #d1ecf1; color: #0c5460; }
    </style>
</head>
<body>
    <h1>文档刷新功能简单测试</h1>
    
    <button class="button" onclick="testRefresh()">测试刷新功能</button>
    <button class="button" onclick="checkAuth()">检查认证状态</button>
    
    <div id="result"></div>
    
    <script>
        function showResult(message, type = 'info') {
            document.getElementById('result').innerHTML = 
                `<div class="status ${type}">${message}</div>`;
        }
        
        async function checkAuth() {
            const token = localStorage.getItem('access_token');
            if (token) {
                showResult(`✅ Token存在: ${token.substring(0, 30)}...`, 'success');
            } else {
                showResult('❌ 没有找到Token，请先登录', 'error');
            }
        }
        
        async function testRefresh() {
            showResult('🔄 正在测试刷新功能...', 'info');
            
            try {
                const token = localStorage.getItem('access_token');
                if (!token) {
                    throw new Error('没有认证Token，请先登录');
                }
                
                const response = await fetch('http://localhost:8888/api/v1/documents/', {
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json',
                    },
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP错误: ${response.status} ${response.statusText}`);
                }
                
                const documents = await response.json();
                showResult(`✅ 刷新成功！找到 ${documents.length} 个文档`, 'success');
                
            } catch (error) {
                showResult(`❌ 刷新失败: ${error.message}`, 'error');
            }
        }
        
        // 页面加载时检查认证状态
        window.onload = checkAuth;
    </script>
</body>
</html>
