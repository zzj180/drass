<!DOCTYPE html>
<html>
<head>
    <title>Config Test</title>
</head>
<body>
    <h1>Configuration Test</h1>
    <div id="config-info"></div>
    
    <script type="module">
        import { getApiUrl, getWebSocketUrl } from './config/config.js';
        
        const configInfo = document.getElementById('config-info');
        configInfo.innerHTML = `
            <p>Backend URL: ${getApiUrl('backend')}</p>
            <p>WebSocket URL: ${getWebSocketUrl()}</p>
            <p>Environment: ${import.meta.env.MODE}</p>
            <p>VITE_BACKEND_PORT: ${import.meta.env.VITE_BACKEND_PORT || 'undefined'}</p>
            <p>VITE_BACKEND_URL: ${import.meta.env.VITE_BACKEND_URL || 'undefined'}</p>
        `;
    </script>
</body>
</html>
