version: '3.8'

services:
  # 主应用服务
  main-app:
    build:
      context: ../../services/main-app
      dockerfile: Dockerfile.prod
    container_name: drass-main-app
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      - ENVIRONMENT=production
      - DEBUG=false
      - LOG_LEVEL=INFO
      - SECRET_KEY=${SECRET_KEY}
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - VLLM_BASE_URL=http://vllm-service:8001/v1
      - EMBEDDING_BASE_URL=http://embedding-service:8010/v1
      - RERANKER_BASE_URL=http://reranker-service:8012/v1
    volumes:
      - ./data/uploads:/app/data/uploads
      - ./data/chromadb:/app/data/chromadb
      - ./logs:/app/logs
    depends_on:
      - vllm-service
      - embedding-service
      - reranker-service
      - redis
    networks:
      - drass-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # VLLM服务
  vllm-service:
    image: vllm/vllm-openai:latest
    container_name: drass-vllm
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - CUDA_VISIBLE_DEVICES=0
    command: >
      --model /models/Qwen2.5-8B-Instruct
      --host 0.0.0.0
      --port 8001
      --api-key 123456
      --served-model-name vllm
      --max-model-len 4096
      --gpu-memory-utilization 0.8
      --dtype bfloat16
    volumes:
      - ./models:/models
    networks:
      - drass-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 嵌入服务
  embedding-service:
    image: vllm/vllm-openai:latest
    container_name: drass-embedding
    restart: unless-stopped
    ports:
      - "8010:8010"
    environment:
      - CUDA_VISIBLE_DEVICES=1
    command: >
      --model /models/Qwen3-Embedding-8B
      --host 0.0.0.0
      --port 8010
      --api-key 123456
      --served-model-name Qwen3-Embedding-8B
      --max-model-len 8096
      --gpu-memory-utilization 0.6
      --dtype bfloat16
    volumes:
      - ./models:/models
    networks:
      - drass-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # 重排序服务
  reranker-service:
    image: vllm/vllm-openai:latest
    container_name: drass-reranker
    restart: unless-stopped
    ports:
      - "8012:8012"
    environment:
      - CUDA_VISIBLE_DEVICES=2
    command: >
      --model /models/Qwen3-Reranker-8B
      --host 0.0.0.0
      --port 8012
      --api-key 123456
      --served-model-name Qwen3-Reranker-8B
      --max-model-len 4096
      --gpu-memory-utilization 0.4
      --dtype bfloat16
    volumes:
      - ./models:/models
    networks:
      - drass-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/v1/models"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Redis缓存服务
  redis:
    image: redis:7-alpine
    container_name: drass-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./data/redis:/data
    networks:
      - drass-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: drass-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - main-app
    networks:
      - drass-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 监控服务
  prometheus:
    image: prom/prometheus:latest
    container_name: drass-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./data/prometheus:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - drass-network

  # Grafana仪表盘
  grafana:
    image: grafana/grafana:latest
    container_name: drass-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - drass-network

  # 日志收集
  loki:
    image: grafana/loki:latest
    container_name: drass-loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./data/loki:/loki
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - drass-network

  # 日志代理
  promtail:
    image: grafana/promtail:latest
    container_name: drass-promtail
    restart: unless-stopped
    volumes:
      - ./logs:/var/log
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki
    networks:
      - drass-network

networks:
  drass-network:
    driver: bridge

volumes:
  data:
  logs:
  models:
