global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

scrape_configs:
  # Prometheus自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # 主应用监控
  - job_name: 'main-app'
    static_configs:
      - targets: ['main-app:8888']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # VLLM服务监控
  - job_name: 'vllm-service'
    static_configs:
      - targets: ['vllm-service:8001']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # 嵌入服务监控
  - job_name: 'embedding-service'
    static_configs:
      - targets: ['embedding-service:8010']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # 重排序服务监控
  - job_name: 'reranker-service'
    static_configs:
      - targets: ['reranker-service:8012']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Redis监控
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
    scrape_interval: 30s

  # Nginx监控
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx:80']
    metrics_path: '/nginx_status'
    scrape_interval: 30s

  # Node Exporter (系统监控)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 30s

  # cAdvisor (容器监控)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
    scrape_interval: 30s
