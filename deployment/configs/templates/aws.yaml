# AWS Deployment Template
# Production deployment using AWS ECS, RDS, and ElastiCache

deployment:
  type: aws
  name: drass-production
  environment: production
  region: us-west-2
  profile: production

services:
  api:
    enabled: true
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/drass/api
    version: latest
    port: 8888
    replicas: 3
    environment:
      LOG_LEVEL: INFO
      ENABLE_CORS: "true"
      ENABLE_STREAMING: "true"
      ENABLE_AGENT: "true"
      ENABLE_MEMORY: "true"
      AWS_REGION: ${AWS_REGION}
    resources:
      cpu: "2"
      memory: "4G"
    health_check:
      enabled: true
      path: /health
      interval: 30
      timeout: 5
      retries: 3

  frontend:
    enabled: true
    image: ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/drass/frontend
    version: latest
    port: 80
    replicas: 2
    environment:
      VITE_API_URL: https://api.drass.example.com
      VITE_WS_URL: wss://api.drass.example.com
      NODE_ENV: production
    resources:
      cpu: "1"
      memory: "2G"

  llm:
    enabled: true
    provider: openrouter  # Use cloud provider for AWS deployment
    model: gpt-4-turbo
    api_key: ${OPENROUTER_API_KEY}
    temperature: 0.7
    max_tokens: 4096
    environment:
      LOG_LEVEL: INFO

  embedding:
    enabled: true
    provider: openai
    model: text-embedding-ada-002
    api_key: ${OPENAI_API_KEY}
    batch_size: 500
    dimensions: 1536

  reranking:
    enabled: true
    provider: cohere
    model: rerank-english-v2.0
    api_key: ${COHERE_API_KEY}
    top_k: 20

  vector_store:
    enabled: true
    provider: pinecone
    connection:
      api_key: ${PINECONE_API_KEY}
      index_name: drass-production
    persistence:
      enabled: true

  database:
    enabled: true
    provider: postgresql
    connection:
      host: drass-db.cluster-xxxxx.us-west-2.rds.amazonaws.com
      port: 5432
      username: drass_admin
      password: ${RDS_PASSWORD}
      database: drass_production
    pool:
      min_connections: 10
      max_connections: 50

  cache:
    enabled: true
    provider: redis
    connection:
      host: drass-cache.xxxxx.ng.0001.usw2.cache.amazonaws.com
      port: 6379
      password: ${ELASTICACHE_AUTH_TOKEN}
      db: 0
    ttl: 7200

environment:
  variables:
    NODE_ENV: production
    PYTHONUNBUFFERED: "1"
    DEPLOYMENT_TYPE: aws
    AWS_REGION: us-west-2
    AWS_DEFAULT_REGION: us-west-2
  secrets:
    OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    OPENAI_API_KEY: ${OPENAI_API_KEY}
    COHERE_API_KEY: ${COHERE_API_KEY}
    PINECONE_API_KEY: ${PINECONE_API_KEY}
    RDS_PASSWORD: ${RDS_PASSWORD}
    ELASTICACHE_AUTH_TOKEN: ${ELASTICACHE_AUTH_TOKEN}
    SECRET_KEY: ${SECRET_KEY}
    JWT_SECRET: ${JWT_SECRET}
    ENCRYPTION_KEY: ${ENCRYPTION_KEY}
  files:
    - .env.production

resources:
  cpu:
    request: "4"
    limit: "8"
  memory:
    request: "8G"
    limit: "16G"
  storage:
    size: "100G"
    type: ebs
    encryption: true
    iops: 3000

networking:
  ports:
    api: 8000
    frontend: 80
    database: 5432
    redis: 6379
  domain: drass.example.com
  ssl: true
  load_balancer:
    enabled: true
    type: alb

scaling:
  enabled: true
  min_instances: 2
  max_instances: 20
  target_cpu: 70

monitoring:
  enabled: true
  providers:
    - cloudwatch
    - datadog
  log_level: INFO

security:
  encryption: true
  secrets_manager: aws-secrets
  firewall_rules:
    - port: 443
      protocol: tcp
      source: 0.0.0.0/0
    - port: 80
      protocol: tcp
      source: 0.0.0.0/0