# Local GPU Deployment Template
# Optimized for Apple Silicon MLX or NVIDIA CUDA hardware acceleration

deployment:
  type: local-gpu
  name: drass-gpu
  environment: production

services:
  api:
    enabled: true
    port: 8000
    replicas: 2
    environment:
      LOG_LEVEL: INFO
      ENABLE_CORS: "true"
      ENABLE_STREAMING: "true"
      ENABLE_AGENT: "true"
      ENABLE_MEMORY: "true"
    resources:
      cpu: "4"
      memory: "4G"
    health_check:
      enabled: true
      path: /health
      interval: 30
      timeout: 5
      retries: 3

  frontend:
    enabled: true
    port: 5173
    replicas: 1
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
      NODE_ENV: production
    resources:
      cpu: "2"
      memory: "2G"

  llm:
    enabled: true
    provider: local-mlx  # Change to 'vllm' for NVIDIA GPU
    model: qwen3-8b-mlx  # Model optimized for MLX
    base_url: http://localhost:8001/v1
    temperature: 0.7
    max_tokens: 4096
    gpu_layers: 32  # Number of layers to offload to GPU
    quantization: bf16  # Use 'int8' or 'int4' for lower memory usage
    port: 8001
    environment:
      MLX_METAL_MEMORY_LIMIT: "16G"  # For Apple Silicon
      CUDA_VISIBLE_DEVICES: "0"  # For NVIDIA GPU
    resources:
      cpu: "4"
      memory: "16G"

  embedding:
    enabled: true
    provider: local
    model: BAAI/bge-large-en-v1.5
    port: 8002
    batch_size: 256
    dimensions: 1024
    resources:
      cpu: "2"
      memory: "4G"

  reranking:
    enabled: true
    provider: local
    model: BAAI/bge-reranker-large
    port: 8004
    top_k: 20
    resources:
      cpu: "2"
      memory: "4G"

  vector_store:
    enabled: true
    provider: chromadb
    connection:
      host: localhost
      port: 8005
    persistence:
      enabled: true
      path: /opt/drass/data/chromadb

  database:
    enabled: true
    provider: postgresql
    connection:
      host: localhost
      port: 5432
      username: drass_user
      password: ${DB_PASSWORD}
      database: drass_production
    pool:
      min_connections: 5
      max_connections: 20

  cache:
    enabled: true
    provider: redis
    connection:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD}
      db: 0
    ttl: 7200

environment:
  variables:
    NODE_ENV: production
    PYTHONUNBUFFERED: "1"
    DEPLOYMENT_TYPE: local-gpu
    PYTORCH_ENABLE_MPS_FALLBACK: "1"  # For Apple Silicon
    TRANSFORMERS_CACHE: /opt/drass/cache/transformers
    HF_HOME: /opt/drass/cache/huggingface
  secrets:
    DB_PASSWORD: ${DB_PASSWORD}
    REDIS_PASSWORD: ${REDIS_PASSWORD}
    SECRET_KEY: ${SECRET_KEY}
    JWT_SECRET: ${JWT_SECRET}
    ENCRYPTION_KEY: ${ENCRYPTION_KEY}
  files:
    - .env.production

resources:
  cpu:
    request: "8"
    limit: "16"
  memory:
    request: "32G"
    limit: "64G"
  gpu:
    enabled: true
    type: apple-silicon  # Change to 'nvidia' for CUDA GPUs
    count: 1
    memory: "16G"  # GPU memory allocation
  storage:
    size: "200G"
    type: nvme
    encryption: true
    iops: 10000

networking:
  ports:
    api: 8000
    frontend: 443
    llm: 8001
    embedding: 8002
    reranking: 8004
    database: 5432
    redis: 6379
    chromadb: 8005
  domain: drass.local
  ssl: true
  load_balancer:
    enabled: true
    type: nginx

scaling:
  enabled: true
  min_instances: 2
  max_instances: 8
  target_cpu: 75

monitoring:
  enabled: true
  providers:
    - prometheus
    - grafana
  log_level: INFO

security:
  encryption: true
  secrets_manager: local
  firewall_rules:
    - port: 443
      protocol: tcp
      source: 0.0.0.0/0
    - port: 8000
      protocol: tcp
      source: 10.0.0.0/8  # Internal network only