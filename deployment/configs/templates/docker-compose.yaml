# Docker Compose Deployment Template
# Complete containerized environment for development and testing

deployment:
  type: docker-compose
  name: drass-docker
  environment: development

services:
  api:
    enabled: true
    image: drass/api
    version: latest
    port: 8000
    replicas: 1
    environment:
      LOG_LEVEL: INFO
      ENABLE_CORS: "true"
      ENABLE_STREAMING: "true"
    resources:
      cpu: "2"
      memory: "2G"
    health_check:
      enabled: true
      path: /health
      interval: 30
      timeout: 5
      retries: 3

  frontend:
    enabled: true
    image: drass/frontend
    version: latest
    port: 5173
    replicas: 1
    environment:
      VITE_API_URL: http://localhost:8000
      VITE_WS_URL: ws://localhost:8000
    resources:
      cpu: "1"
      memory: "1G"

  llm:
    enabled: true
    provider: openrouter
    model: gpt-3.5-turbo
    api_key: ${OPENROUTER_API_KEY}
    temperature: 0.7
    max_tokens: 2048
    environment:
      LOG_LEVEL: INFO

  embedding:
    enabled: true
    provider: local
    model: all-MiniLM-L6-v2
    port: 8002
    batch_size: 100
    resources:
      cpu: "1"
      memory: "1G"

  reranking:
    enabled: false
    provider: local
    model: cross-encoder/ms-marco-MiniLM-L-12-v2
    top_k: 10

  vector_store:
    enabled: true
    provider: chromadb
    connection:
      host: localhost
      port: 8005
    persistence:
      enabled: true
      path: ./data/chromadb

  database:
    enabled: true
    provider: postgresql
    connection:
      host: localhost
      port: 5432
      username: postgres
      password: ${DB_PASSWORD}
      database: drass
    pool:
      min_connections: 2
      max_connections: 10

  cache:
    enabled: true
    provider: redis
    connection:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD}
      db: 0
    ttl: 3600

environment:
  variables:
    NODE_ENV: development
    PYTHONUNBUFFERED: "1"
    DEPLOYMENT_TYPE: docker-compose
  secrets:
    OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    DB_PASSWORD: ${DB_PASSWORD}
    REDIS_PASSWORD: ${REDIS_PASSWORD}
    SECRET_KEY: ${SECRET_KEY}
    JWT_SECRET: ${JWT_SECRET}
  files:
    - .env
    - .env.local

resources:
  cpu:
    request: "4"
    limit: "8"
  memory:
    request: "8G"
    limit: "16G"
  storage:
    size: "50G"
    type: ssd
    encryption: true

networking:
  ports:
    api: 8000
    frontend: 5173
    database: 5432
    redis: 6379
    chromadb: 8005
    embedding: 8002
  ssl: false
  load_balancer:
    enabled: false

monitoring:
  enabled: true
  providers:
    - prometheus
    - grafana
  log_level: INFO

security:
  encryption: true
  secrets_manager: local
  firewall_rules:
    - port: 8000
      protocol: tcp
      source: 0.0.0.0/0
    - port: 5173
      protocol: tcp
      source: 0.0.0.0/0