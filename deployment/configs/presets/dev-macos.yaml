# MacOS Development Environment Preset (Apple Silicon)
version: "1.0"

metadata:
  name: "dev-macos"
  description: "Optimized configuration for MacOS development with Apple Silicon"
  author: "Drass Team"
  created_at: "2024-01-15T10:00:00Z"

deployment:
  type: "local-gpu"
  environment: "development"
  health_check_enabled: true
  health_check_interval: 30

infrastructure:
  local_gpu:
    gpu_type: "apple_silicon"
    metal_enabled: true
    mlx_enabled: true

services:
  llm:
    provider: "local-mlx"
    model: "Qwen3-8B-MLX-bf16"
    mlx_model_path: "${HOME}/.lmstudio/models/Qwen/Qwen3-8B-MLX-bf16"
    base_url: "http://localhost:8001/v1"
    mlx_precision: "bfloat16"
    temperature: 0.7
    max_tokens: 4096
    timeout: 60
    context_length: 32768

  embedding:
    provider: "local"
    model: "BAAI/bge-base-en-v1.5"
    api_base: "http://localhost:8002"
    batch_size: 100
    dimensions: 768
    device: "mps"
    local_model_path: "./models/embeddings/bge-base-en-v1.5"

  reranking:
    enabled: true
    provider: "local"
    model: "BAAI/bge-reranker-base"
    api_base: "http://localhost:8004"
    top_k: 10
    device: "mps"
    local_model_path: "./models/reranking/bge-reranker-base"

  document_processor:
    enabled: true
    api_base: "http://localhost:8003"
    max_file_size: "100MB"
    supported_formats: ["pdf", "docx", "xlsx", "pptx", "txt", "md", "html", "csv"]
    ocr_enabled: true

  vector_store:
    type: "chromadb"
    host: "localhost"
    port: 8000
    collection_name: "drass_docs"

  database:
    type: "sqlite"
    sqlite_path: "./data/drass.db"
    database: "compliance_assistant"

  cache:
    type: "memory"
    ttl: 3600

application:
  main_app:
    host: "127.0.0.1"
    port: 8000
    workers: 2
    enable_docs: true
    cors_origins: ["http://localhost:5173", "http://localhost:3000"]
    enable_streaming: true
    enable_agent: true
    enable_memory: true
    rate_limit_enabled: false
    jwt_enabled: false

  frontend:
    port: 5173
    build_mode: "development"
    api_base: "http://localhost:8000"
    websocket_url: "ws://localhost:8000/ws"
    source_map: true
    minify: false

monitoring:
  enabled: false

logging:
  level: "DEBUG"
  format: "text"
  outputs:
    - type: "console"
    - type: "file"
      path: "./logs/app.log"