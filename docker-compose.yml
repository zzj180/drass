services:
  # Frontend - React Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: langchain-frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - main-app
    networks:
      - langchain-network

  # Main Backend - FastAPI with LangChain
  main-app:
    build:
      context: ./services/main-app
      dockerfile: Dockerfile
    container_name: langchain-backend
    ports:
      - "8000:8000"
    environment:
      # LLM Configuration
      - LLM_PROVIDER=openai
      - OPENAI_API_BASE=http://host.docker.internal:8001/v1
      - LLM_MODEL=qwen3-8b-mlx
      - LLM_API_KEY=none
      
      # Embedding Service
      - EMBEDDING_API_BASE=http://embedding-service:8001
      - EMBEDDING_MODEL=BAAI/bge-base-en-v1.5
      
      # Reranking Service
      - RERANKING_ENABLED=true
      - RERANKING_API_BASE=http://reranking-service:8002
      
      # Vector Store
      - VECTOR_STORE_TYPE=chromadb
      - CHROMA_SERVER_HOST=chromadb
      - CHROMA_SERVER_PORT=8000
      
      # Database
      - DATABASE_URL=postgresql://langchain:langchain123@postgres:5432/langchain_db
      - REDIS_URL=redis://redis:6379
      
      # Security
      - SECRET_KEY=your-secret-key-change-in-production
      - JWT_ALGORITHM=HS256
      
      # Features
      - ENABLE_STREAMING=true
      - ENABLE_AGENT=true
      - ENABLE_MEMORY=true
    volumes:
      - ./services/main-app:/app
      - ./data/uploads:/app/uploads
    depends_on:
      - postgres
      - redis
      - chromadb
      - embedding-service
      - reranking-service
      - doc-processor
    networks:
      - langchain-network

  # Embedding Service
  embedding-service:
    build:
      context: ./services/embedding-service
      dockerfile: Dockerfile
    container_name: langchain-embedding
    ports:
      - "8002:8001"
    environment:
      - MODEL_NAME=BAAI/bge-base-en-v1.5
      - CACHE_TYPE=redis
      - REDIS_URL=redis://redis:6379
      - BATCH_SIZE=32
      - MAX_LENGTH=512
    volumes:
      - ./models/embeddings:/app/models
    depends_on:
      - redis
    networks:
      - langchain-network

  # Reranking Service (Optimized)
  reranking-service:
    build:
      context: ./services/reranking-service
      dockerfile: Dockerfile
      target: app  # Use app stage, skip model pre-download
      cache_from:
        - drass-reranking-service:latest
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: langchain-reranking
    ports:
      - "8004:8002"
    environment:
      # Service configuration
      - RERANKING_PROVIDER=${RERANKING_PROVIDER:-sentence-transformers}
      - RERANKING_MODEL=${RERANKING_MODEL:-cross-encoder/ms-marco-MiniLM-L-12-v2}
      - RERANKING_DEVICE=${RERANKING_DEVICE:-cpu}
      - RERANKING_MAX_LENGTH=${RERANKING_MAX_LENGTH:-512}

      # Performance configuration
      - RERANKING_BATCH_SIZE=${RERANKING_BATCH_SIZE:-32}
      - RERANKING_MAX_DOCUMENTS=${RERANKING_MAX_DOCUMENTS:-100}

      # Cache configuration
      - CACHE_TYPE=${CACHE_TYPE:-lru}
      - CACHE_SIZE=${CACHE_SIZE:-1000}
      - CACHE_TTL=${CACHE_TTL:-3600}
      - REDIS_URL=redis://redis:6379

      # Model cache directories
      - MODEL_CACHE_DIR=/app/model_cache
      - HF_HOME=/app/model_cache
      - TRANSFORMERS_CACHE=/app/model_cache

      # Logging configuration
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_FORMAT=json

      # Fallback configuration
      - FALLBACK_ENABLED=true
    volumes:
      - ./models/reranking:/app/model_cache
      - ./logs/reranking:/app/logs
    networks:
      - langchain-network
    restart: unless-stopped

    # Resource limits
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 512M
          cpus: '0.5'

    # Health check
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

    # Dependencies
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_started

  # Document Processor
  doc-processor:
    build:
      context: ./services/doc-processor
      dockerfile: Dockerfile
    container_name: langchain-doc-processor
    ports:
      - "5003:5003"
    environment:
      - MAX_FILE_SIZE=50
      - OCR_ENABLED=true
      - OCR_LANGUAGE=chi_sim+eng
      - PANDOC_ENABLED=true
    volumes:
      - ./data/documents:/app/documents
      - ./data/processed:/app/processed
    networks:
      - langchain-network

  # LLM Gateway (Optional - for multi-provider support)
  llm-gateway:
    build:
      context: ./services/llm-gateway
      dockerfile: Dockerfile
    container_name: langchain-llm-gateway
    ports:
      - "8003:8003"
    environment:
      - REDIS_URL=redis://redis:6379
      - CACHE_TTL=3600
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GATEWAY_CONFIG=/app/config/providers.yaml
    volumes:
      - ./services/llm-gateway/config:/app/config
    depends_on:
      - redis
    networks:
      - langchain-network

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: langchain-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=langchain
      - POSTGRES_PASSWORD=langchain123
      - POSTGRES_DB=langchain_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langchain"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - langchain-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: langchain-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - langchain-network

  # ChromaDB Vector Store
  chromadb:
    image: chromadb/chroma:latest
    container_name: langchain-chromadb
    ports:
      - "8005:8000"
    environment:
      - CHROMA_SERVER_AUTH_PROVIDER=chromadb.auth.token_authn.TokenAuthenticationServerProvider
      - CHROMA_SERVER_AUTH_CREDENTIALS_PROVIDER=chromadb.auth.token_authn.TokenConfigServerCredentialsProvider
      - CHROMA_SERVER_AUTH_TOKEN_TRANSPORT_HEADER=AUTHORIZATION
      - CHROMA_SERVER_AUTH_CREDENTIALS=test-token
      - PERSIST_DIRECTORY=/chroma/chroma
      - IS_PERSISTENT=TRUE
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - langchain-network

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: langchain-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - main-app
    networks:
      - langchain-network
    profiles:
      - production

  # Prometheus (Monitoring)
  prometheus:
    image: prom/prometheus:latest
    container_name: langchain-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - langchain-network
    profiles:
      - monitoring

  # Grafana (Metrics Dashboard)
  grafana:
    image: grafana/grafana:latest
    container_name: langchain-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=redis-datasource
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - langchain-network
    profiles:
      - monitoring

volumes:
  postgres_data:
  redis_data:
  chroma_data:
  prometheus_data:
  grafana_data:

networks:
  langchain-network:
    driver: bridge