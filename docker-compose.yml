# Docker Compose configuration for Drass Dify Platform
# Based on official Dify documentation: https://docs.dify.ai/zh-hans/getting-started/install-self-hosted/docker-compose

services:
  # Dify API Service
  api:
    image: langgenius/dify-api:latest
    container_name: drass-api
    restart: unless-stopped
    environment:
      - EDITION=SELF_HOSTED
      - CONSOLE_URL=http://localhost
      - SERVICE_API_URL=http://localhost/v1
      - APP_API_URL=http://localhost/v1
      - WEB_API_URL=http://localhost/v1
      - WORKFLOW_API_URL=http://localhost/v1
      - FILES_URL=http://localhost
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SQLALCHEMY_DATABASE_URI=postgresql://dify:${DB_PASSWORD:-dify_password}@db:5432/dify
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=0
      - WEAVIATE_ENDPOINT=http://weaviate:8080
      - WEAVIATE_API_KEY=${WEAVIATE_API_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-your-encryption-key-here}
      - DIFY_API_KEY=${DIFY_API_KEY:-}
      - DIFY_WORKSPACE_ID=${DIFY_WORKSPACE_ID:-}
      - DIFY_PLATFORM_URL=${DIFY_PLATFORM_URL:-}
      - OPENDAL_SCHEME=fs
      - OPENDAL_ROOT=/app/api/storage
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/api/storage
      - PLUGIN_DAEMON_URL=http://plugin_daemon:5002
    volumes:
      - ./data/api:/app/api/storage
      - ./config/dify:/app/api/config
    depends_on:
      - db
      - redis
      - weaviate
      - plugin_daemon
    networks:
      - drass-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Dify Worker Service
  worker:
    image: langgenius/dify-api:latest
    container_name: drass-worker
    restart: unless-stopped
    environment:
      - EDITION=SELF_HOSTED
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - SQLALCHEMY_DATABASE_URI=postgresql://dify:${DB_PASSWORD:-dify_password}@db:5432/dify
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=0
      - WEAVIATE_ENDPOINT=http://weaviate:8080
      - WEAVIATE_API_KEY=${WEAVIATE_API_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-your-encryption-key-here}
      - OPENDAL_SCHEME=fs
      - OPENDAL_ROOT=/app/api/storage
      - STORAGE_TYPE=local
      - STORAGE_LOCAL_PATH=/app/api/storage
    volumes:
      - ./data/worker:/app/api/storage
      - ./config/dify:/app/api/config
    depends_on:
      - db
      - redis
      - weaviate
    networks:
      - drass-network
    command: ["celery", "-A", "celery_app", "worker", "--loglevel=info"]

  # Dify Web Frontend
  web:
    image: langgenius/dify-web:latest
    container_name: drass-web
    restart: unless-stopped
    environment:
      - CONSOLE_API_URL=http://localhost/v1
      - APP_API_URL=http://localhost/v1
      - WORKFLOW_API_URL=http://localhost/v1
      - FILES_URL=http://localhost
      - SENTRY_DSN=${SENTRY_DSN:-}
    volumes:
      - ./data/web:/app/web/storage
      - ./config/web:/app/web/config
    depends_on:
      - api
    networks:
      - drass-network

  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: drass-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=dify
      - POSTGRES_USER=dify
      - POSTGRES_PASSWORD=${DB_PASSWORD:-dify_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - drass-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dify -d dify"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:6-alpine
    container_name: drass-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - drass-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Weaviate Vector Database
  weaviate:
    image: semitechnologies/weaviate:1.19.0
    container_name: drass-weaviate
    restart: unless-stopped
    environment:
      - QUERY_DEFAULTS_LIMIT=25
      - AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED=true
      - PERSISTENCE_DATA_PATH=/var/lib/weaviate
      - DEFAULT_VECTORIZER_MODULE=none
      - ENABLE_MODULES=text2vec-openai,text2vec-cohere,text2vec-huggingface,ref2vec-centroid,generative-openai,qna-openai
      - CLUSTER_HOSTNAME=node1
    volumes:
      - weaviate_data:/var/lib/weaviate
    networks:
      - drass-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/.well-known/ready"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy
  nginx:
    image: nginx:latest
    container_name: drass-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/dify.conf:/etc/nginx/conf.d/dify.conf:ro
    depends_on:
      - api
      - web
    networks:
      - drass-network
    profiles:
      - web

  # SSRF Proxy for Security
  ssrf_proxy:
    image: ubuntu/squid:latest
    container_name: drass-ssrf-proxy
    restart: unless-stopped
    volumes:
      - ./nginx/squid.conf:/etc/squid/squid.conf:ro
    networks:
      - drass-network

  # Dify Sandbox for Code Execution
  sandbox:
    image: langgenius/dify-sandbox:latest
    container_name: drass-sandbox
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=1
    depends_on:
      - redis
    networks:
      - drass-network

  # Dify Plugin Daemon Service
  plugin_daemon:
    image: langgenius/dify-plugin-daemon:latest
    container_name: drass-plugin-daemon
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=2
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-here}
    volumes:
      - ./data/plugin:/app/plugin/storage
    depends_on:
      - redis
    networks:
      - drass-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Monitoring and logging
  prometheus:
    image: prom/prometheus:latest
    container_name: drass-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    networks:
      - drass-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: drass-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - drass-network
    profiles:
      - monitoring

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  weaviate_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  drass-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
