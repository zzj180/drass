# Grafana dashboard configuration for Drass Dify application
apiVersion: 1

providers:
  - name: 'Drass Dashboards'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
