# Complete Nginx configuration for Dify platform

upstream dify_api {
    server api:5001;
}

upstream dify_web {
    server web:3000;
}

server {
    listen 80;
    server_name _;

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # Console API endpoints (management console)
    location /console/api/ {
        access_log /var/log/nginx/console_api_access.log;
        error_log /var/log/nginx/console_api_error.log debug;
        
        proxy_pass http://dify_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Service API endpoints (v1)
    location /v1/ {
        access_log /var/log/nginx/service_api_access.log;
        error_log /var/log/nginx/service_api_error.log debug;
        
        proxy_pass http://dify_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Web API endpoints
    location /api/ {
        access_log /var/log/nginx/web_api_access.log;
        error_log /var/log/nginx/web_api_error.log debug;
        
        proxy_pass http://dify_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Inner API endpoints
    location /inner/api/ {
        access_log /var/log/nginx/inner_api_access.log;
        error_log /var/log/nginx/inner_api_error.log debug;
        
        proxy_pass http://dify_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # MCP endpoints
    location /mcp/ {
        access_log /var/log/nginx/mcp_access.log;
        error_log /var/log/nginx/mcp_error.log debug;
        
        proxy_pass http://dify_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Files endpoints
    location /files/ {
        access_log /var/log/nginx/files_access.log;
        error_log /var/log/nginx/files_error.log debug;
        
        proxy_pass http://dify_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Web interface (must be last to catch all other requests)
    location / {
        access_log /var/log/nginx/web_access.log;
        error_log /var/log/nginx/web_error.log debug;
        
        proxy_pass http://dify_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
