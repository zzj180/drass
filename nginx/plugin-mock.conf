server {
    listen 5002;
    server_name localhost;

    # Health check endpoint
    location /health {
        return 200 '{"status": "healthy"}';
        add_header Content-Type application/json;
    }

    # Plugin tasks endpoint
    location ~ ^/plugin/.*/management/install/tasks {
        return 200 '{"result": "success", "data": [], "message": "No plugin tasks found"}';
        add_header Content-Type application/json;
    }

    # Default response for other plugin endpoints
    location /plugin/ {
        return 200 '{"data": [], "total": 0}';
        add_header Content-Type application/json;
    }

    # Default response
    location / {
        return 200 '{"status": "plugin daemon mock service"}';
        add_header Content-Type application/json;
    }
}
